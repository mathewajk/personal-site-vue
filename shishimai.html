<!-- Crawler-facing shell for /shishimai (see vercel.json). Keep og:* / twitter:* in sync with src/site-meta.ts. -->
<html lang="en">
  <head>
    <script>
      (function () {
        var k = 'theme'
        var v = localStorage.getItem(k)
        var dark =
          v === 'dark' || (v !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      })()
    </script>
